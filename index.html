<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>75 Whole — Family Challenge</title>
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#f4f2ee;min-height:100vh;color:#1a1a1a}
    #root{max-width:600px;margin:0 auto;padding:1rem 1rem 5rem}
    input{font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:1px solid #ddd;border-radius:7px;padding:7px 11px;width:100%;outline:none;transition:border-color .15s}
    input:focus{border-color:#C84B11;box-shadow:0 0 0 3px rgba(200,75,17,.07)}
    button{font-family:inherit;cursor:pointer}
    .hov:hover{background:rgba(0,0,0,.025)!important}
    .dc{cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;aspect-ratio:1;transition:transform .1s;user-select:none}
    .dc:hover{transform:scale(1.14)}
    .nb{cursor:pointer;background:none;border:none;font-family:inherit}
    ::-webkit-scrollbar{height:4px;width:4px}
    ::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
  </style>
</head>
<body>
<div id="root"></div>

<script>
  // ── Firebase init ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDx99XsSy2qpZjkMIfsKUc4WC5bbOfPFuQ",
    authDomain: "whole-ee16d.firebaseapp.com",

    messagingSenderId: "847688134385",

  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const DB_REF = db.ref("75whole");
</script>

<script type="text/babel">
const { useState, useEffect } = React;

/* ── Constants ───────────────────────────────── */
const START   = "2026-05-11";
const DAYS    = 75;
const MAX_CH  = 5;
const TOTAL_W = Math.ceil(DAYS / 7);

/* ── 7 Categories ────────────────────────────── */
const CATS = [
  { id:"exercise",   label:"Exercise",   abbr:"EX", accent:"#C84B11", bg:"#FEF0E7", cheatExempt:false, adultDef:"45 min workout",               kidDef:"30 min active play or sport"   },
  { id:"diet",       label:"Diet",       abbr:"DT", accent:"#1D7A4F", bg:"#E6F5EE", cheatExempt:true,  adultDef:"Whole foods only, no alcohol",  kidDef:"No junk food or sugary drinks"  },
  { id:"cleaning",   label:"Cleaning",   abbr:"CL", accent:"#1356A2", bg:"#E4EEFA", cheatExempt:false, adultDef:"Tidy one area of the home",     kidDef:"Tidy your room"                },
  { id:"brain",      label:"Brain",      abbr:"BR", accent:"#5435A8", bg:"#EEE9FB", cheatExempt:false, adultDef:"Read 10 pages",                 kidDef:"Read for 20 min"               },
  { id:"phone",      label:"Phone",      abbr:"PH", accent:"#A62757", bg:"#FAE7F0", cheatExempt:false, adultDef:"No social media after 9pm",     kidDef:"Max 1 hr recreational screens" },
  { id:"additional", label:"Additional", abbr:"AD", accent:"#0A6B5E", bg:"#E3F5F2", cheatExempt:false, adultDef:"5 min prayer or journaling",    kidDef:"One act of kindness"           },
  { id:"other",      label:"Other",      abbr:"OT", accent:"#5A6472", bg:"#EEF0F2", cheatExempt:false, adultDef:"Progress photo",                kidDef:"Help with a household task"    },
];

/* ── Color themes ────────────────────────────── */
const MC = [
  { bg:"#FEF0E7", border:"#F4A76A", text:"#4A1800", accent:"#C84B11" },
  { bg:"#E6F5EE", border:"#5AC98A", text:"#0A2E1A", accent:"#1D7A4F" },
  { bg:"#EEE9FB", border:"#9B82E0", text:"#1A0E42", accent:"#5435A8" },
  { bg:"#E4EEFA", border:"#6FA4E8", text:"#091E42", accent:"#1356A2" },
  { bg:"#FAE7F0", border:"#E07AA8", text:"#3D0018", accent:"#A62757" },
  { bg:"#E3F5F2", border:"#5BBFB3", text:"#032820", accent:"#0A6B5E" },
  { bg:"#EEF0F2", border:"#98A6B4", text:"#1A232B", accent:"#5A6472" },
];

/* ── Date helpers ────────────────────────────── */
const pad = n => String(n).padStart(2,"0");
function dStr(d)       { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr()    { return dStr(new Date()); }
function dateForDay(n) { const d=new Date(START+"T00:00:00"); d.setDate(d.getDate()+n-1); return dStr(d); }
function dayForDate(s) { return Math.floor((new Date(s+"T00:00:00")-new Date(START+"T00:00:00"))/86400000)+1; }
function currentDay()  { return Math.max(1,Math.min(dayForDate(todayStr()),DAYS)); }
function fmtDate(s)    { return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function wkOf(day)     { return Math.ceil(day/7); }
function wkDays(wn)    { const s=(wn-1)*7+1; return Array.from({length:Math.min(7,DAYS-s+1)},(_,i)=>s+i); }

/* ── Default goals ───────────────────────────── */
function mkGoals(type) {
  const g = {};
  CATS.forEach(c => { g[c.id] = { label: type==="kid" ? c.kidDef : c.adultDef, enabled: true }; });
  return g;
}

/* ── Normalize Firebase data ─────────────────── */
// Firebase converts arrays → objects with numeric keys — convert back
function normalize(val) {
  if (!val) return null;
  const out = {...val};
  // members
  if (out.members && !Array.isArray(out.members))
    out.members = Object.values(out.members);
  out.members = (out.members || []).map(m => {
    const base = mkGoals(m.type || "adult");
    Object.keys(m.goals || {}).forEach(k => { if (base[k]) base[k] = m.goals[k]; });
    return {...m, goals: base};
  });
  // cheats
  if (out.cheats && !Array.isArray(out.cheats))
    out.cheats = Object.values(out.cheats);
  if (!out.cheats) out.cheats = [];
  // logs — nested objects, leave as-is
  if (!out.logs) out.logs = {};
  return out;
}

const INIT = {
  members: [{ id:"gary", name:"Gary", type:"adult", colorIdx:0, goals:mkGoals("adult") }],
  logs: {}, cheats: []
};

/* ── Scoring ─────────────────────────────────── */
function dayScore(member, logs, cheats, ds) {
  const isCheat = cheats.includes(ds);
  const active  = CATS.filter(c => member.goals[c.id]?.enabled !== false && !(isCheat && c.cheatExempt));
  const lg      = logs[ds]?.[member.id] || {};
  const done    = active.filter(c => lg[c.id]).length;
  const tot     = active.length;
  const allDone = done === tot && tot > 0;
  return { pts: done, done, tot, allDone, isCheat, max: tot };
}

function wkScore(m, logs, cheats, wn) {
  const td = todayStr(); let pts=0, max=0;
  wkDays(wn).forEach(d => {
    const ds=dateForDay(d); if(ds>td) return;
    const s=dayScore(m,logs,cheats,ds); pts+=s.pts; max+=s.max;
  });
  return { pts, max };
}

function totalScore(m, logs, cheats) {
  const cd=currentDay(), td=todayStr(); let pts=0, max=0, perf=0;
  for(let i=1;i<=cd;i++){
    const ds=dateForDay(i); if(ds>td) break;
    const s=dayScore(m,logs,cheats,ds); pts+=s.pts; max+=s.max; if(s.allDone) perf++;
  }
  return { pts, max, perf };
}

/* ── GoalEditor ──────────────────────────────── */
function GoalEditor({ goals, onChange }) {
  return (
    <div>
      {CATS.map((c,i) => {
        const g = goals[c.id] || { label:"", enabled:true };
        return (
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
            borderBottom:i<CATS.length-1?"1px solid #f2ede6":"none"}}>
            <div style={{width:22,height:16,borderRadius:3,background:c.bg,display:"flex",
              alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,
              color:c.accent,flexShrink:0}}>{c.abbr}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,fontWeight:700,color:"#bbb",textTransform:"uppercase",
                letterSpacing:.5,marginBottom:3}}>{c.label}</div>
              <input value={g.label} disabled={!g.enabled}
                onChange={e => onChange(c.id,{...g,label:e.target.value})}
                placeholder={`${c.label} goal`}
                style={{opacity:g.enabled?1:.35}}/>
            </div>
            <button onClick={() => onChange(c.id,{...g,enabled:!g.enabled})}
              style={{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",
                position:"relative",flexShrink:0,
                background:g.enabled?c.accent:"#ddd",transition:"background .2s"}}>
              <div style={{width:14,height:14,borderRadius:7,background:"#fff",position:"absolute",
                top:3,transition:"left .2s",left:g.enabled?19:3}}/>
            </button>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App() {
  const [d, setD]               = useState(null);       // null = loading
  const [tab, setTab]           = useState("today");
  const [sel, setSel]           = useState("gary");
  const [vDay, setVDay]         = useState(null);
  const [addStep, setAddStep]   = useState(0);
  const [addName, setAddName]   = useState("");
  const [addType, setAddType]   = useState("adult");
  const [addGoals, setAddGoals] = useState({});
  const [editId, setEditId]     = useState(null);
  const [editGoals, setEditGoals] = useState({});
  const [jsonMsg, setJsonMsg]   = useState("");
  const [online, setOnline]     = useState(true);
  /* ── Firebase listener (single source of truth) ── */
  useEffect(() => {
    const connRef = db.ref(".info/connected");
    connRef.on("value", snap => setOnline(!!snap.val()));

    DB_REF.on("value", snap => {
      const val = snap.val();
      if (!val) { DB_REF.set(INIT); return; }
      setD(normalize(val) || INIT);
    });

    return () => { DB_REF.off(); connRef.off(); };
  }, []);

  useEffect(() => {
    if (d && !d.members.find(m => m.id===sel)) setSel(d.members[0]?.id||"");
  }, [d?.members]);

  /* ── Derived ── */
  if (!d) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",minHeight:"60vh",gap:16}}>
      <div style={{fontSize:24}}>🔥</div>
      <div style={{fontSize:15,fontWeight:600,color:"#555"}}>Connecting to Firebase…</div>
      <div style={{fontSize:12,color:"#bbb"}}>Loading shared family data</div>
    </div>
  );

  const cd      = currentDay();
  const vd      = vDay ?? cd;
  const vDate   = dateForDay(vd);
  const TODAY   = todayStr();
  const mem     = d.members.find(m => m.id===sel);
  const mc      = MC[(mem?.colorIdx||0) % MC.length];
  const isCheat = d.cheats.includes(vDate);
  const lg      = d.logs[vDate]?.[mem?.id] || {};
  const dsMem   = mem ? dayScore(mem,d.logs,d.cheats,vDate) : null;

  /* ── Handlers — write directly to Firebase, listener updates UI ── */
  function toggle(catId) {
    if (!mem) return;
    const cat = CATS.find(c=>c.id===catId);
    if (mem.goals[catId]?.enabled===false || (isCheat&&cat?.cheatExempt)) return;
    const current = !!(d.logs[vDate]?.[mem.id]?.[catId]);
    DB_REF.child('logs').child(vDate).child(mem.id).child(catId).set(!current);
  }

  function toggleCheat(ds) {
    if (d.cheats.includes(ds)) {
      DB_REF.child('cheats').set(d.cheats.filter(x=>x!==ds));
    } else {
      if (d.cheats.length >= MAX_CH) return;
      DB_REF.child('cheats').set([...d.cheats, ds]);
    }
  }

  function advanceAdd() {
    if(!addName.trim()) return;
    setAddGoals(mkGoals(addType));
    setAddStep(2);
  }

  function finishAdd() {
    const nm = { id:Date.now().toString(), name:addName.trim(), type:addType,
                 colorIdx:d.members.length%MC.length, goals:addGoals };
    DB_REF.child('members').set([...d.members, nm]);
    setSel(nm.id); setAddStep(0); setAddName("");
  }

  function saveEdit() {
    DB_REF.child('members').set(d.members.map(m=>m.id===editId?{...m,goals:editGoals}:m));
    setEditId(null);
  }

  function rmMember(id) {
    const rem = d.members.filter(m=>m.id!==id);
    DB_REF.child('members').set(rem);
    if(sel===id) setSel(rem[0]?.id||"");
  }

  function dStatus(ds) {
    if(ds>TODAY) return "future";
    if(d.cheats.includes(ds)) return "cheat";
    let td=0,tp=0;
    d.members.forEach(m=>{ const s=dayScore(m,d.logs,d.cheats,ds); td+=s.done; tp+=s.tot; });
    if(!tp) return "empty";
    if(td===tp) return "perfect";
    if(td>0) return "partial";
    return "missed";
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const now  = new Date();
    const stamp= `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
    a.href = url; a.download = `75whole-backup-${stamp}.json`; a.click();
    URL.revokeObjectURL(url);
    setJsonMsg("✓ Downloaded! Save to Google Drive as a backup.");
    setTimeout(()=>setJsonMsg(""),4000);
  }

  function importJSON(e) {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!parsed.members || !Array.isArray(parsed.members)) throw new Error();
        const norm = normalize(parsed) || INIT;
        DB_REF.set(norm);
        setJsonMsg("✓ Progress restored and synced to Firebase!");
        setTimeout(()=>setJsonMsg(""),4000);
      } catch {
        setJsonMsg("✗ Invalid file — please use a 75whole backup.");
        setTimeout(()=>setJsonMsg(""),4000);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  const card = {background:"#fff",border:"1px solid #e6e1d9",borderRadius:12,overflow:"hidden"};

  /* ══════════════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════════════ */
  return (
    <div>
      {/* ── Header ── */}
      <div style={{marginBottom:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <h1 style={{fontSize:20,fontWeight:700,margin:0,letterSpacing:"-.3px"}}>75 Whole</h1>
              <div style={{width:7,height:7,borderRadius:"50%",
                background:online?"#1D7A4F":"#ccc",
                boxShadow:online?"0 0 0 2px #E6F5EE":"none"}}
                title={online?"Live sync on":"Offline"}/>
            </div>
            <p style={{fontSize:12,color:"#bbb",margin:"3px 0 0"}}>Family challenge · May 11 – Jul 24, 2026</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:24,fontWeight:700,lineHeight:1}}>{TODAY>=START?`Day ${cd}`:"Starts soon"}</div>
              <div style={{fontSize:10,color:"#ccc"}}>{TODAY>=START?`of ${DAYS}`:"May 11, 2026"}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={exportJSON}
                style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",
                  background:"#fff",color:"#555",border:"1px solid #ddd"}}>⬇ Export</button>
              <label style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",
                background:"#fff",color:"#555",border:"1px solid #ddd",display:"flex",alignItems:"center"}}>
                ⬆ Import
                <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
              </label>
            </div>
          </div>
        </div>
        <div style={{height:4,background:"#e6e1d9",borderRadius:2,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.round(cd/DAYS*100)}%`,background:"#C84B11",borderRadius:2}}/>
        </div>
        <div style={{fontSize:10,color:"#ccc",marginTop:3}}>{Math.round(cd/DAYS*100)}% complete</div>
        {jsonMsg&&(
          <div style={{marginTop:8,padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:600,
            background:jsonMsg.startsWith("✓")?"#E6F5EE":"#FFF0F0",
            color:jsonMsg.startsWith("✓")?"#1D7A4F":"#B71C1C",
            border:`1px solid ${jsonMsg.startsWith("✓")?"#5AC98A":"#fcc"}`}}>
            {jsonMsg}
          </div>
        )}
        {!online&&(
          <div style={{marginTop:8,padding:"7px 12px",borderRadius:8,fontSize:11,fontWeight:600,
            background:"#FFF8E1",color:"#7A5000",border:"1px solid #FFD54F"}}>
            ⚠ Offline — changes will sync when connection returns
          </div>
        )}
      </div>

      {/* ── Tabs ── */}
      <div style={{display:"flex",borderBottom:"1px solid #e6e1d9",marginBottom:"1.25rem"}}>
        {[["today","Today"],["points","Points"],["progress","Progress"],["rules","Rules"],["family","Family"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setTab(id)} className="nb"
            style={{padding:"9px 11px",fontSize:13,fontWeight:tab===id?700:400,
              color:tab===id?"#1a1a1a":"#bbb",background:"none",
              borderBottom:tab===id?"2px solid #C84B11":"2px solid transparent",
              marginBottom:"-1px",whiteSpace:"nowrap"}}>
            {lb}
          </button>
        ))}
      </div>

      {/* ════ TODAY ════ */}
      {tab==="today"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",marginBottom:14}}>
            <button onClick={()=>setVDay(Math.max(1,vd-1))} className="nb"
              style={{fontSize:22,color:"#ccc",padding:"2px 10px"}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <span style={{fontSize:15,fontWeight:700}}>{fmtDate(vDate)}</span>
              <span style={{fontSize:12,color:"#bbb",marginLeft:8}}>Day {vd}</span>
              {vDate===TODAY&&<span style={{marginLeft:8,fontSize:10,background:"#FEF0E7",color:"#4A1800",
                padding:"2px 7px",borderRadius:4,fontWeight:700}}>today</span>}
            </div>
            <button onClick={()=>setVDay(Math.min(DAYS,vd+1))} className="nb"
              style={{fontSize:22,color:"#ccc",padding:"2px 10px",opacity:vd>=DAYS?.3:1}}>›</button>
          </div>

          <div style={{background:isCheat?"#FEF0E7":"#f8f6f3",
            border:`1px solid ${isCheat?"#F4A76A":"#e6e1d9"}`,borderRadius:10,
            padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:isCheat?"#4A1800":"#666"}}>
                {isCheat?"Cheat day active":"Mark as cheat day"}
              </div>
              <div style={{fontSize:11,color:isCheat?"#C84B11":"#ccc",marginTop:1}}>
                {d.cheats.length}/{MAX_CH} used · diet suspended
              </div>
            </div>
            <button onClick={()=>toggleCheat(vDate)}
              disabled={!isCheat&&d.cheats.length>=MAX_CH}
              style={{padding:"5px 12px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",
                background:isCheat?"#C84B11":"#fff",color:isCheat?"#fff":"#888",
                border:`1px solid ${isCheat?"#C84B11":"#ddd"}`,
                opacity:(!isCheat&&d.cheats.length>=MAX_CH)?.4:1}}>
              {isCheat?"Unmark":"Mark"}
            </button>
          </div>

          {d.members.length>1&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {d.members.map(m=>{
                const mc2=MC[m.colorIdx%MC.length],active=sel===m.id;
                const sc=dayScore(m,d.logs,d.cheats,vDate);
                return(
                  <button key={m.id} onClick={()=>setSel(m.id)}
                    style={{padding:"5px 12px",borderRadius:20,fontSize:13,fontWeight:active?700:400,cursor:"pointer",
                      background:active?mc2.bg:"transparent",color:active?mc2.text:"#bbb",
                      border:`1px solid ${active?mc2.border:"#e0dbd3"}`}}>
                    {m.name} <span style={{fontSize:11,opacity:.8}}>{sc.pts}pt{sc.allDone?" ★":""}</span>
                  </button>
                );
              })}
            </div>
          )}

          {mem&&(
            <div style={{...card,marginBottom:14}}>
              <div style={{padding:"10px 16px",background:mc.bg,borderBottom:"1px solid #e6e1d9",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:14,fontWeight:700,color:mc.text}}>{mem.name}</span>
                {dsMem&&<span style={{fontSize:16,fontWeight:700,color:mc.accent}}>{dsMem.pts} pts</span>}
              </div>
              {CATS.map((cat,i)=>{
                const g=mem.goals[cat.id];
                const enabled=g?.enabled!==false;
                const suspended=isCheat&&cat.cheatExempt;
                const off=!enabled||suspended;
                const done=!!lg[cat.id]&&!off;
                return(
                  <div key={cat.id} onClick={()=>!off&&toggle(cat.id)} className="hov"
                    style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",
                      borderBottom:i<CATS.length-1?"1px solid #f5f0ea":"none",
                      cursor:off?"default":"pointer",opacity:off?.28:1,
                      background:done?`${cat.bg}99`:"#fff",transition:"background .15s"}}>
                    <div style={{width:20,height:20,borderRadius:5,flexShrink:0,

          )}

          {!editId&&addStep===2&&(
            <div style={{...card,marginBottom:14}}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid #e6e1d9",
                display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setAddStep(1)} className="nb" style={{fontSize:18,color:"#bbb"}}>‹</button>
                <div>
                  <div style={{fontSize:14,fontWeight:700}}>{addName}'s goals</div>
                  <div style={{fontSize:11,color:"#bbb"}}>Customize each · toggle off ones that don't apply</div>
                </div>
              </div>
              <div style={{padding:"0 16px"}}>
                <GoalEditor goals={addGoals} onChange={(id,g)=>setAddGoals(p=>({...p,[id]:g}))}/>
              </div>
              <div style={{padding:"12px 16px",borderTop:"1px solid #e6e1d9"}}>
                <button onClick={finishAdd}
                  style={{width:"100%",padding:"10px",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer",
                    background:"#C84B11",color:"#fff",border:"none"}}>
                  Add {addName} to the challenge ›
                </button>
              </div>
            </div>
          )}

          {!editId&&d.members.map(m=>{
            const mc2=MC[m.colorIdx%MC.length];
            const tot=totalScore(m,d.logs,d.cheats);
            const activeCats=CATS.filter(c=>m.goals[c.id]?.enabled!==false);
            const eff=tot.max>0?Math.round(tot.pts/tot.max*100):0;
            return(
              <div key={m.id} style={{...card,marginBottom:12}}>
                <div style={{padding:"12px 16px",background:mc2.bg,borderBottom:"1px solid #e6e1d9",
                  display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:mc2.accent,display:"flex",
                    alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,
                    color:"#fff",flexShrink:0}}>{m.name[0]}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,color:mc2.text}}>{m.name}</div>
                    <div style={{fontSize:12,color:mc2.accent,opacity:.8,marginTop:1}}>{m.type} · {activeCats.length} active goals</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:700,color:mc2.accent}}>{tot.pts}</div>
                    <div style={{fontSize:10,color:mc2.accent,opacity:.6}}>total pts</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderBottom:"1px solid #e6e1d9"}}>
                  {[["Perfect",tot.perf],["Max pts",tot.max],[`${eff}%`,"Efficiency"],[`${MAX_CH-d.cheats.length}`,"Cheat left"]].map(([v,lb],i,arr)=>(
                    <div key={lb} style={{padding:"10px 8px",textAlign:"center",borderRight:i<arr.length-1?"1px solid #f5f0ea":"none"}}>
                      <div style={{fontSize:15,fontWeight:700}}>{v}</div>
                      <div style={{fontSize:9,color:"#ccc",marginTop:2}}>{lb}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"10px 16px",borderBottom:"1px solid #f5f0ea"}}>
                  <div style={{fontSize:10,color:"#bbb",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Active goals</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {activeCats.map(c=>(
                      <div key={c.id} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:20,height:13,borderRadius:2,background:c.bg,display:"flex",
                          alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:700,
                          color:c.accent,flexShrink:0}}>{c.abbr}</div>
                        <span style={{fontSize:11,color:"#999",width:60,flexShrink:0}}>{c.label}:</span>
                        <span style={{fontSize:11,color:"#444",fontWeight:500}}>{m.goals[c.id]?.label||c.adultDef}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{padding:"10px 16px",display:"flex",gap:8}}>
                  <button onClick={()=>{setEditId(m.id);setEditGoals(JSON.parse(JSON.stringify(m.goals)));}}
                    style={{flex:1,padding:"7px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",
                      background:"#f8f6f3",color:"#555",border:"1px solid #e6e1d9"}}>Edit goals</button>
                  {d.members.length>1&&(
                    <button onClick={()=>rmMember(m.id)}
                      style={{padding:"7px 12px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",
                        background:"#fff",color:"#B71C1C",border:"1px solid #fcc"}}>Remove</button>
                  )}
                </div>
              </div>
            );
          })}

          <div style={{background:"#EEE9FB",border:"1px solid #9B82E0",borderRadius:12,
            padding:16,textAlign:"center",marginTop:4}}>
            <p style={{fontSize:13,color:"#1A0E42",fontStyle:"italic",lineHeight:1.75,margin:"0 0 6px"}}>
              "Do you not know that in a race all the runners run, but only one gets the prize?
              Run in such a way as to get the prize."
            </p>
            <p style={{fontSize:11,color:"#5435A8",margin:0}}>1 Corinthians 9:24</p>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
